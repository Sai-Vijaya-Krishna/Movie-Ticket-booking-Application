<!DOCTYPE html>
<html>
<head>
    <title>Select Seats</title>

    <!-- 🔒 Prevent direct access without login -->
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "auth/auth.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #seatMap {
            display: inline-block;
            margin-top: 20px;
        }

        .seat-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .seat {
            width: 34px;
            height: 34px;
            margin: 3px;
            background-color: #444;
            border-radius: 5px;
            cursor: pointer;
            line-height: 34px;
            color: white;
            font-size: 10px;
            user-select: none;
        }

        .seat.selected {
            background-color: yellow;
            color: black;
        }

        .seat.locked {
            background-color: orange;
            cursor: not-allowed;
        }

        .seat.occupied {
            background-color: red;
            cursor: not-allowed;
        }

        .seat-gap {
            width: 18px;
        }

        #continueBtn {
            background-color: yellow;
            color: black;
            font-weight: bold;
            padding: 12px 25px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 13px;
        }

        .box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .available { background: #444; }
        .selected-box { background: yellow; }
        .locked-box { background: orange; }
        .occupied-box { background: red; }
    </style>
</head>

<body>

<h2>Select Your Seats</h2>

<div class="legend">
    <span><div class="box available"></div> Available</span>
    <span><div class="box selected-box"></div> Selected</span>
    <span><div class="box locked-box"></div> Locked</span>
    <span><div class="box occupied-box"></div> Booked</span>
</div>

<div id="seatMap"></div>

<h3>SCREEN</h3>
<hr style="width:60%;opacity:0.3;">

<div>
    <p>Selected Seats: <b id="selectedSeats">None</b></p>
    <p>Total Price: <b id="totalPrice">0</b></p>
</div>

<button id="continueBtn">Continue</button>

<script>
    const rows = ["A","B","C","D","E","F","G","H"];
    const seatsPerRow = 20;
    const maxSeats = 6;

    let selectedSeats = [];
    let lockedSeats = [];     // temporary locks
    let occupiedSeats = [];   // booked seats
    let stompClient = null;
    let reconnectAttempts = 0;

    function getSeatPrice(row) {
        return ["A","B","C"].includes(row) ? 250 : 180;
    }

    function loadSeats() {
        const seatMap = document.getElementById("seatMap");
        seatMap.innerHTML = "";

        rows.forEach(row => {
            const rowDiv = document.createElement("div");
            rowDiv.className = "seat-row";

            for (let i = 1; i <= seatsPerRow; i++) {
                const seatNumber = row + i;
                const seatDiv = document.createElement("div");
                seatDiv.className = "seat";
                seatDiv.innerText = i;

                if (occupiedSeats.includes(seatNumber)) {
                    seatDiv.classList.add("occupied");
                } 
                else if (lockedSeats.includes(seatNumber) &&
                        !selectedSeats.includes(seatNumber)) {
                    seatDiv.classList.add("locked");
                } 
                else if (selectedSeats.includes(seatNumber)) {
                    seatDiv.classList.add("selected");
                }

                if (!seatDiv.classList.contains("occupied") &&
                    !seatDiv.classList.contains("locked")) {
                    seatDiv.addEventListener("click", () => {
                        toggleSeatSelection(seatNumber);
                    });
                }

                rowDiv.appendChild(seatDiv);

                if (i === 10) {
                    const gapDiv = document.createElement("div");
                    gapDiv.className = "seat-gap";
                    rowDiv.appendChild(gapDiv);
                }
            }

            seatMap.appendChild(rowDiv);
        });

        updateSelectedInfo();
    }

    function toggleSeatSelection(seatNumber) {

        if (selectedSeats.includes(seatNumber)) {

            selectedSeats = selectedSeats.filter(s => s !== seatNumber);

            stompClient.send("/app/unlock-seat", {}, JSON.stringify({
                movieId: localStorage.getItem("movieId"),
                theatre: localStorage.getItem("theatre"),
                showTime: localStorage.getItem("time"),
                seatNumber: seatNumber
            }));

        } else {

            if (selectedSeats.length >= maxSeats) {
                alert(`You can select up to ${maxSeats} seats.`);
                return;
            }

            selectedSeats.push(seatNumber);

            stompClient.send("/app/lock-seat", {}, JSON.stringify({
                movieId: localStorage.getItem("movieId"),
                theatre: localStorage.getItem("theatre"),
                showTime: localStorage.getItem("time"),
                seatNumber: seatNumber
            }));
        }

        loadSeats();
    }

    function updateSelectedInfo() {
        const selectedSeatsEl = document.getElementById("selectedSeats");
        const totalPriceEl = document.getElementById("totalPrice");

        if (selectedSeats.length === 0) {
            selectedSeatsEl.innerText = "None";
            totalPriceEl.innerText = "0";
            return;
        }

        selectedSeatsEl.innerText = selectedSeats.join(", ");

        let total = 0;
        selectedSeats.forEach(seat => {
            total += getSeatPrice(seat.charAt(0));
        });

        totalPriceEl.innerText = total;
    }

    function connectWebSocket() {
        const token = localStorage.getItem("token");
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect(
            { Authorization: 'Bearer ' + token },
            frame => {

                stompClient.subscribe('/topic/seats-updates', message => {
                    const data = JSON.parse(message.body);

                    lockedSeats = data.locked || [];
                    occupiedSeats = data.booked || [];

                    loadSeats();
                });

            },
            error => {
                if (reconnectAttempts < 5) {
                    reconnectAttempts++;
                    const delay = Math.pow(2, reconnectAttempts) * 1000;
                    setTimeout(connectWebSocket, delay);
                } else {
                    alert("WebSocket connection failed.");
                }
            }
        );
    }

    document.getElementById("continueBtn").addEventListener("click", () => {

        if (selectedSeats.length === 0) {
            alert("Please select at least one seat.");
            return;
        }

        localStorage.setItem("seats", selectedSeats.length);
        localStorage.setItem("seatNumbers", selectedSeats.join(", "));

        let totalAmount = 0;
        selectedSeats.forEach(seat => {
            totalAmount += getSeatPrice(seat.charAt(0));
        });

        localStorage.setItem("totalAmount", totalAmount);

        window.location.href = "payment.html";
    });

    window.onload = () => {
        connectWebSocket();
        loadSeats();
    };
</script>

</body>
</html>
