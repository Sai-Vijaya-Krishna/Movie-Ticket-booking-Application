<!DOCTYPE html>
<html>
<head>
    <title>Select City</title>
    <link rel="stylesheet" href="/css/style.css">

    <!-- 🔒 Prevent direct access without login -->
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "auth/auth.html";
        }
    </script>

    <style>
        .header-buttons {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .header-buttons button {
            background-color: yellow;
            color: black;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .header-buttons button:hover {
            background-color: gold;
        }

        h2 {
            text-align: center;
            color: white;
        }

        .full-center {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
    </style>
</head>
<body>

<!-- Welcome & Navigation -->
<h2>Welcome, <span id="usernameDisplay"></span></h2>
<div class="header-buttons">
    <button onclick="window.location.href='history.html'">Booking History</button>
</div>

<!-- City Selection -->
<div class="full-center">
    <div class="container card">
        <h2>Select City</h2>
        <div id="locationContainer"></div>
    </div>
</div>

<script>
    // Display username
    document.getElementById("usernameDisplay").innerText =
        localStorage.getItem("username") || "Guest";

    // Cities
    const cities = ["Chennai", "Bangalore", "Hyderabad", "Mumbai"];
    const container = document.getElementById("locationContainer");

    cities.forEach(city => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = city;
        div.onclick = () => {
            localStorage.setItem("location", city);
            window.location.href = "theatre.html";
        };
        container.appendChild(div);
    });
</script>

</body>
</html>
