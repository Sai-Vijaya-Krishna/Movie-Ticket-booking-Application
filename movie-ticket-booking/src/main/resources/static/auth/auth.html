<!DOCTYPE html>
<html>
<head>
    <title>Authentication</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="full-center">
    <div class="container card">

        <h2 id="authTitle">Choose Authentication Type</h2>

        <!-- Step 1: Choose -->
        <div id="authChoice">
            <button class="btn-yellow" onclick="chooseAuth('signin')">
                Sign In
            </button>

            <button class="btn-red" onclick="chooseAuth('signup')">
                Sign Up
            </button>
        </div>

        <!-- Step 2: Form -->
        <div id="authForm" style="display:none; margin-top:15px;">

            <!-- Email only for Sign In -->
            <div id="emailBox" style="display:none;">
                <input id="email" placeholder="Enter Email">
            </div>

            <input id="mobile" placeholder="Enter Mobile Number">

            <button class="btn-yellow" onclick="sendOtp()">Send OTP</button>

            <div id="otpBox" style="display:none; margin-top:10px;">
                <input id="otp" placeholder="Enter OTP">
                <button class="btn-yellow" onclick="verifyOtp()">Verify OTP</button>
            </div>

        </div>

    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="/js/app.js"></script>

</body>
</html>
